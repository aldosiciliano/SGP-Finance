<!DOCTYPE html>
<html>
<head>
    <title>Generador de Íconos SGP Finance</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        canvas { border: 1px solid #ccc; margin: 10px; }
        button { padding: 10px 20px; background: #3B82F6; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Generador de Íconos SGP Finance</h1>
    <p>Haz clic en el botón para generar y descargar los íconos:</p>
    <button onclick="generateIcons()">Generar Íconos</button>
    <div id="canvases"></div>

    <script>
        function generateIcons() {
            const sizes = [16, 32, 48, 128];
            const container = document.getElementById('canvases');
            container.innerHTML = '';

            sizes.forEach(size => {
                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');

                // Fondo azul
                ctx.fillStyle = '#3B82F6';
                const radius = size * 0.2;
                ctx.beginPath();
                ctx.moveTo(radius, 0);
                ctx.lineTo(size - radius, 0);
                ctx.quadraticCurveTo(size, 0, size, radius);
                ctx.lineTo(size, size - radius);
                ctx.quadraticCurveTo(size, size, size - radius, size);
                ctx.lineTo(radius, size);
                ctx.quadraticCurveTo(0, size, 0, size - radius);
                ctx.lineTo(0, radius);
                ctx.quadraticCurveTo(0, 0, radius, 0);
                ctx.closePath();
                ctx.fill();

                // Círculo blanco semi-transparente
                ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.beginPath();
                ctx.arc(size / 2, size / 2, size * 0.35, 0, Math.PI * 2);
                ctx.fill();

                // Símbolo $
                ctx.fillStyle = 'white';
                ctx.font = `bold ${size * 0.6}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('$', size / 2, size / 2);

                container.appendChild(canvas);

                // Descargar
                canvas.toBlob(blob => {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `icon${size}.png`;
                    a.click();
                    URL.revokeObjectURL(url);
                });
            });
        }
    </script>
</body>
</html>
